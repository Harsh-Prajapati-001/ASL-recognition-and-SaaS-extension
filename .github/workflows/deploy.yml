name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest pytest-cov black isort

    - name: Lint with black
      run: black --check src/ config/

    - name: Lint with isort
      run: isort --check-only src/ config/

    - name: Lint with flake8
      run: |
        flake8 src/ config/ --count --select=E9,F63,F7,F82 --show-source --statistics --max-line-length=120
        flake8 src/ config/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Type checking
      run: |
        pip install mypy
        mypy src/ || true

    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: asl-detector:latest
        cache-from: type=registry,ref=asl-detector:buildcache
        cache-to: type=registry,ref=asl-detector:buildcache,mode=max

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to Railway
      if: secrets.RAILWAY_TOKEN != ''
      run: |
        npm install -g @railway/cli
        railway up --service asl-detector
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    - name: Deploy to Render
      if: secrets.RENDER_DEPLOY_KEY != ''
      run: |
        curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}

    - name: Notify deployment
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'ASL Detector deployed successfully! 🚀'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      continue-on-error: true
