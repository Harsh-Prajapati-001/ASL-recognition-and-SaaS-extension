services:
  - type: web
    name: asl-detector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --workers 2 --worker-class sync src.app:app
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
